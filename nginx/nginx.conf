events {
    worker_connections 1024;
}

http {
    # Gzip compression (Requirement 8.3)
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 256;

    server {
        listen 80;

        # Block external access to /metrics (Requirement 8.5)
        location /metrics {
            deny all;
            return 403;
        }

        # Static asset caching for Next.js (Requirement 8.4)
        location /_next/static {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Proxy /api to backend (Requirement 8.2)
        location /api {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket support (Requirement 8.5)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Proxy / to frontend (Requirement 8.1)
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket support for Next.js HMR (Requirement 8.5)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
