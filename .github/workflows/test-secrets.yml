name: Test Secrets Configuration

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test-secrets:
    name: Verify Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Check GHCR_TOKEN
        run: |
          if [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "❌ GHCR_TOKEN is not set"
            exit 1
          else
            echo "✅ GHCR_TOKEN is set"
          fi
      
      - name: Check SUPABASE_URL
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "❌ SUPABASE_URL is not set"
            exit 1
          else
            echo "✅ SUPABASE_URL is set"
          fi
      
      - name: Check SUPABASE_SERVICE_KEY
        run: |
          if [ -z "${{ secrets.SUPABASE_SERVICE_KEY }}" ]; then
            echo "❌ SUPABASE_SERVICE_KEY is not set"
            exit 1
          else
            echo "✅ SUPABASE_SERVICE_KEY is set"
          fi
      
      - name: Check GROQ_API_KEY
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "❌ GROQ_API_KEY is not set"
            exit 1
          else
            echo "✅ GROQ_API_KEY is set"
          fi
      
      - name: Check EC2_HOST (Optional)
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "⚠️  EC2_HOST is not set (optional for deployment)"
          else
            echo "✅ EC2_HOST is set"
          fi
      
      - name: Check EC2_SSH_KEY (Optional)
        run: |
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "⚠️  EC2_SSH_KEY is not set (optional for deployment)"
          else
            echo "✅ EC2_SSH_KEY is set"
          fi
      
      - name: Summary
        run: |
          echo ""
          echo "🎉 All required secrets are configured!"
          echo "You can now enable the build-push job in deploy.yml"
