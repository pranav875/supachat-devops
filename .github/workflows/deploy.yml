name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Wait for PostgreSQL
        env:
          PGPASSWORD: testpass
        run: |
          until pg_isready -h localhost -p 5432 -U testuser; do
            echo "Waiting for postgres..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: backend

      - name: Verify installations
        run: |
          python -c "import fastapi; print('fastapi OK')"
          python -c "import asyncpg; print('asyncpg OK')"
          python -c "import openai; print('openai OK')"
          python -c "import pytest; print('pytest OK')"
        working-directory: backend

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          TEST_DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          GROQ_API_KEY: test-key
          SUPABASE_URL: http://test-supabase-url.com
          SUPABASE_SERVICE_KEY: test-key
        run: pytest --tb=short -v
        working-directory: backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Clean build artifacts
        run: rm -rf .next .swc
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

  build-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    if: false  # Disabled until GHCR_TOKEN secret is configured
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/supachat-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/supachat-frontend:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/supachat-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/supachat-backend:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    if: false  # Disabled until build-push is enabled and EC2 secrets are configured

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_SHA
          script: |
            cd ~/supachat

            # Pull latest images
            docker-compose pull

            # Rolling restart with no downtime
            docker-compose up -d --no-deps --scale frontend=1 backend=1

            # Verify all services are running
            docker-compose ps

            # Fail if any service is not running
            docker-compose ps | grep -v "Up" | grep -v "NAME" && exit 1 || true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
